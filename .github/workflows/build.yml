name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ANDROID_HOME: ${{ runner.home }}/Android/Sdk
      ANDROID_SDK_ROOT: ${{ runner.home }}/Android/Sdk
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            unzip \
            zip \
            openjdk-17-jdk \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libsdl2-dev
      - name: Install Android SDK
        run: |
          mkdir -p "${ANDROID_HOME}/cmdline-tools"
          curl -fSL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d "${ANDROID_HOME}/cmdline-tools"
          mv "${ANDROID_HOME}/cmdline-tools/cmdline-tools" "${ANDROID_HOME}/cmdline-tools/latest"
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_HOME}" --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.0.8775104"
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_HOME}" --licenses
      - name: Add Android tools to PATH
        run: |
          echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${ANDROID_HOME}/platform-tools" >> $GITHUB_PATH
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython
      - name: Run Buildozer
        run: buildozer -v android debug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: focusbreeze-apk
          path: bin/*.apk
