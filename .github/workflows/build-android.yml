name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            unzip \
            zip \
            openjdk-17-jdk \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libsdl2-dev
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython
      - name: Run Buildozer
        run: buildozer -v android debug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: focusbreeze-apk
          path: bin/*.apk
